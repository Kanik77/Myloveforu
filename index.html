<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You Smoothie ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- PASSWORD SCREEN -->
<div id="login">
    <h2>Enter Password 💌</h2>
    <input type="password" id="password" placeholder="Enter password">
    <button onclick="checkPassword()">Enter</button>
    <p id="error"></p>
</div>

<!-- MAIN CONTENT (HIDDEN FIRST) -->
<div id="mainContent" style="display:none;">

    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div class="hearts"></div>

    <div class="container">
        <h1>For My Love ❤️</h1>
        <p class="message">
            mommmmmyyyyyyyyy 
            i lovee uu mommmmmyyyyyyyyy 
          tooo tooo tooo muchh , i lovee uu sooo soo
          muchhhhh , i can't explain it in wordssss 
          and I'm missin uuu...i hope we will soon meet 
        </p>

        <div class="photos">
            <img src="photo1.jpg">
            <img src="photo2.jpg">
            <img src="photo3.jpg">
        </div>

        <button onclick="showLove()">Click for Surprise 💌</button>
    </div>

</div>

<script>
    function checkPassword() {
        var pass = document.getElementById("password").value;

        if(pass === "iloveyou123") {  // 👉 CHANGE THIS PASSWORD
            document.getElementById("login").style.display = "none";
            document.getElementById("mainContent").style.display = "block";

            var music = document.getElementById("bgMusic");
            music.play();
        } else {
            document.getElementById("error").innerText = "Wrong password 😢";
        }
    }

    function showLove() {
        alert("I love you mommyyy 💋");
    }

    // Floating hearts
    const heartsContainer = document.createElement('div');
    heartsContainer.classList.add('hearts');
    document.body.appendChild(heartsContainer);

    function createHeart() {
        const heart = document.createElement('div');
        heart.classList.add('heart');
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
        heartsContainer.appendChild(heart);

        setTimeout(() => heart.remove(), 5000);
    }

    setInterval(createHeart, 300);
</script>

</body>
</html>
